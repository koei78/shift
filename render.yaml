databases:
  - name: shift-db
    databaseName: shift_app
    user: shift_user
    plan: free

services:
  - type: web
    name: shift-app-admin
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: shift-db
          property: connectionString
